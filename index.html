        body { background-color: #000; color: #FFF; font-family: -apple-system, "SF Pro", "SF Mono", monospace; padding-bottom: 200px; }
        .page-container { max-width: 1200px; margin: 0 auto; padding: 0 16px; width: 100%; }
        .nav-header { background: #121212; border-bottom: 0.5px solid #333; padding: 12px 16px; display: flex; align-items: center; gap: 8px; position: sticky; top: 0; z-index: 100; width: 100%; border-radius: 12px; }
        #searchInput { background: transparent; flex: 1; min-width: 0; outline: none; font-weight: bold; font-size: 18px; color: white; }

        .row-gold, .row-gold span, .row-gold b, .row-gold div { background-image: linear-gradient(135deg, #ffffff 0%, #f3d078 50%, #d4af37 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; opacity: 1 !important; }

        .list-row { display: grid; grid-template-columns: 0.8fr 1.2fr 1.8fr 1.8fr 1.8fr 2fr 4fr; align-items: center; padding: 8px 0; border-bottom: 1px solid #111; font-size: 14px; color: #FFF; white-space: nowrap; }

        .history-row { display: grid; grid-template-columns: 120px 100px 1fr; align-items: center; padding: 8px 0; border-bottom: 1px solid #111; font-size: 14px; color: #FFF; white-space: nowrap; }

        .rank-header-AD { display: flex; justify-content: center; align-items: center; background: #2C2C2E; padding: 10px; border-radius: 12px; margin-bottom: 15px; gap: 20px; border: 0.5px solid #444; }

        .year-side:hover { color: #D4AF37; }
        .year-center { background: linear-gradient(135deg, #ffffff 0%, #f3d078 50%, #d4af37 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; font-size: 18px; display: inline-block; }

    <script id="worker-script" type="text/javascript-worker">
        importScripts('https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js');
        let db = null;
        self.onmessage = async function(e) {
            const { type, data, query, id } = e.data;
            if (type === 'INIT') {
                const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${f}` });
                db = new SQL.Database(data);
                self.postMessage({ type: 'READY' });
            } else if (type === 'QUERY') {
                try {
                    const res = db.exec(query);
                    self.postMessage({ type: 'RESULT', id: id, res: res });
                } catch (err) { self.postMessage({ type: 'ERROR', id: id, msg: err.message }); }
            }
        };
    </script>

        const OperationLogger = {

            add(action, details, status = 'INFO') {

                const logEntry = `[${timestamp}] [${status}] ${action}: ${detailStr}`;
                this.logs.push(logEntry);

                }).catch(e => console.warn('[Log Sync Error] Backend log write failed:', e));
            },
            export() {
                const blob = new Blob([this.logs.join('\n')], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `web_operation_logs_${new Date().getTime()}.txt`;

                document.body.removeChild(a);
                URL.revokeObjectURL(url);

            return Math.floor(1000 * Math.pow((b[s]?.[parseInt(dist)]||100)/sec, 3));

        async function getRankData(dist, stroke, name, birth, sex, isNational) {
            const pattern = `%${dist}公尺%${stroke}%`;
            let filter = `項目 LIKE '${pattern}' AND 性別 = '${sex}' AND ${LC_FILTER}`;
            if (isNational) filter += ` AND (年份 LIKE '2026%' OR 年份 LIKE '2025%')`; else filter += ` AND 出生年='${birth}'`;
            const res = await remoteQuery(`SELECT 姓名, 成績, 年份, 賽事名稱, 出生年, 項目 FROM swimming_scores WHERE ${filter}`);
            if (!res[0]) return [];
            const pBs = {};
            res[0].values.forEach(v => {
                const m = v[5].match(/(\d+)公尺/);
                if (!m || m[1] !== String(dist)) return;

                const pN = v[0], sec = timeToSec(v[1]);
                if (sec > 0 && (!pBs[pN] || sec < pBs[pN].sec)) pBs[pN] = { name: pN, sec, raw: formatToXcode(sec), fullDate: v[2], meet: v[3], wa: getWA(dist, stroke, v[1], sex), birthYear: v[4] };
            });
            return Object.values(pBs).sort((a,b) => a.sec - b.sec);
        }

        async function renderMatrix(dist, stroke, sex) {
            const currentYear = new Date().getFullYear();
            const showYears = []; for (let i = 0; i < 5; i++) { showYears.push((currentYear - i).toString()); }
            const groups = ["18以上", "高中", "國中", "國小高年級", "國小中年級", "國小低年級"];
            const res = await remoteQuery(`SELECT 年份, 姓名, 出生年, 成績, 項目 FROM swimming_scores WHERE 項目 LIKE '%${dist}公尺%${stroke}%' AND 性別 = '${sex.includes("男")?"男":"女"}' AND ${LC_FILTER} AND 成績 != ''`);
            let matrix = { "All-Time": {} }; showYears.forEach(y => matrix[y] = {});
            function getG(age) { if (age < 9) return "國小低年級"; if (age <= 10) return "國小中年級"; if (age <= 12) return "國小高年級"; if (age <= 14) return "國中"; if (age <= 17) return "高中"; return "18以上"; }
            if (res[0]) {
                res[0].values.forEach(v => {
                    const m = v[4].match(/(\d+)公尺/);
                    if (!m || m[1] !== String(dist)) return;

                    const rY = parseInt(String(v[0]).substring(0,4)), sec = timeToSec(v[3]), bY = toAD(v[2]);
                    const g = getG(rY - bY);
                    if (matrix[rY] && (!matrix[rY][g] || sec < matrix[rY][g].sec)) matrix[rY][g] = { n: v[1], sec };
                    if (!matrix["All-Time"][g] || sec < matrix["All-Time"][g].sec) matrix["All-Time"][g] = { n: v[1], sec };
                });
            }
            let colorMap = {}, all = new Set();
            Object.values(matrix).forEach(row => groups.forEach(g => { if(row[g]) all.add(row[g].n); }));
            Array.from(all).sort().forEach((n, i) => colorMap[n] = `hsl(${(i * (360 / all.size))}, 85%, 65%)`);
            let h = `<div class="data-panel"><div style="color:#FFD933; font-weight:bold; margin-bottom:10px;">年度最佳矩陣</div><div style="overflow-x:auto;"><table class="matrix-table"><tr style="background:#2C2C2E;"><th>年度</th>${groups.map(g=>`<th>${g}</th>`).join('')}</tr>`;
            ["All-Time", ...showYears].forEach(y => { h += `<tr><td class="font-bold">${y}</td>`; groups.forEach(g => { const r = matrix[y][g]; h += r ? `<td><b style="color:${colorMap[r.n]}; text-shadow:1px 1px 1px #000;">${r.n}</b><br><small>${formatToXcode(r.sec)}</small></td>` : `<td>-</td>`; }); h += `</tr>`; });
            return h + "</table></div></div>";
        }

        async function downloadDatabasePartsFromServer(version, totalParts) {
            document.getElementById('progressContainer').classList.remove('hidden');
            const statusEl = document.getElementById('loaderStatus');
            const progressBar = document.getElementById('progressBar');
            statusEl.textContent = `準備自雲端同步資料庫 (分卷 0/${totalParts})...`;
            progressBar.style.width = '0%';
            
            try {
                const partUrls = [];
                for (let i = 0; i < totalParts; i++) {
                    partUrls.push(`/static/db_parts/db.part${i}?v=${version}`);
                }
                
                const partsData = [];
                let totalLoaded = 0;
                
                // 依序單個下載，防止行動裝置 Safari 併發連線崩潰與記憶體溢出
                for (let i = 0; i < totalParts; i++) {
                    const response = await fetch(partUrls[i]);
                    if (!response.ok) throw new Error(`分卷 ${i} 下載失敗`);
                    
                    const contentLength = response.headers.get('content-length');
                    const partLength = contentLength ? parseInt(contentLength, 10) : 15 * 1024 * 1024;
                    
                    const reader = response.body.getReader();
                    const chunks = [];
                    let partLoaded = 0;
                    
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        chunks.push(value);
                        partLoaded += value.length;
                        totalLoaded += value.length;
                        
                        // 估算總大小為 252.5MB
                        const pct = Math.min(99, Math.round((totalLoaded / (252.5 * 1024 * 1024)) * 100));
                        progressBar.style.width = `${pct}%`;
                        statusEl.textContent = `雲端下載中: ${pct}% (分卷 ${i+1}/${totalParts})`;
                    }
                    
                    const partBlob = new Blob(chunks);
                    partsData.push(new Uint8Array(await partBlob.arrayBuffer()));
                }
                
                statusEl.textContent = "下載完成！正在合併分卷與初始化資料庫...";
                progressBar.style.width = '100%';
                
                // 合併分卷
                let totalSize = partsData.reduce((acc, part) => acc + part.length, 0);
                const mergedArray = new Uint8Array(totalSize);
                let offset = 0;
                for (const part of partsData) {
                    mergedArray.set(part, offset);
                    offset += part.length;
                }
                
                worker.postMessage({ type: 'INIT', data: mergedArray });
                
                statusEl.textContent = "正在快取最新資料庫，下次即可秒開...";
                const blob = new Blob([mergedArray]);
                
                const openReq = indexedDB.open("SwimSQL", 1);
                openReq.onupgradeneeded = e => {
                    if (!e.target.result.objectStoreNames.contains("files")) {
                        e.target.result.createObjectStore("files");
                    }
                };
                openReq.onsuccess = e => {
                    const db = e.target.result;
                    const tx = db.transaction("files", "readwrite");
                    tx.objectStore("files").put(blob, "current_db");
                    tx.oncomplete = () => {
                        localStorage.setItem('cached_db_time', String(version));
                        document.getElementById('dbLoaderArea').style.display = 'none';
                        doSearch();
                    };
                };
            } catch (err) {
                console.error(err);
                statusEl.textContent = `❌ 自動同步下載失敗: ${err.message}。請確認您的網路連線，或重新整理網頁再試。`;
                document.getElementById('manualUploadBtn').classList.remove('hidden');
            }
        }

        async function fetchWithTimeout(resource, options = {}) {
            const { timeout = 3000 } = options;
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(resource, {
                    ...options,
                    signal: controller.signal
                });
                clearTimeout(id);
                return response;
            } catch (err) {
                clearTimeout(id);
                throw err;
            }
        }

        async function startSystem() {
            if (isLocal) {
                const statusEl = document.getElementById('loaderStatus');
                if (statusEl) statusEl.textContent = "🚀 偵測為本地執行，免下載直接查詢本機資料庫中...";
                document.getElementById('dbLoaderArea').style.display = 'none';
                doSearch();
                return;
            }
            const statusEl = document.getElementById('loaderStatus');
            const progressContainer = document.getElementById('progressContainer');
            if (progressContainer) progressContainer.classList.remove('hidden');
            
            if (statusEl) statusEl.textContent = "⏳ [1/4] 正在檢查網路與連線雲端...";

            let cloudVersion = null;
            let totalParts = 0;
            
            try {
                // 輕量獲取雲端最新分卷版本與分卷數 (超時 3 秒，使用前置斜線定位)
                const apiResp = await fetchWithTimeout('/static/db_parts/version.json', {
                    cache: 'no-store',
                    timeout: 3000
                });
                if (apiResp.ok) {
                    const verData = await apiResp.json();
                    cloudVersion = verData.version;
                    totalParts = verData.parts;
                }
            } catch (apiErr) {
                console.warn("無法連接雲端 version.json，將嘗試加載本地快取:", apiErr);
            }

            if (statusEl) statusEl.textContent = "⏳ [2/4] 正在比對版本與檢查快取...";
            const localTime = localStorage.getItem('cached_db_time');

            // 如果有雲端版本，且本地時間一致，且 IndexedDB 裡有資料庫，就直接載入
            if (cloudVersion && localTime === String(cloudVersion)) {
                const hasCached = await checkIndexedDBHasCached();
                if (hasCached) {
                    if (statusEl) statusEl.textContent = "⏳ [3/4] 偵測為最新版，正在讀取快取資料庫...";
                    try {
                        await loadCachedDatabase();
                        return;
                    } catch (cacheLoadErr) {
                        console.warn("讀取快取資料庫失敗，將重新下載:", cacheLoadErr);
                    }
                }
            }

            // 否則，下載新分卷
            if (cloudVersion && totalParts > 0) {
                if (statusEl) statusEl.textContent = "⏳ [4/4] 正在自雲端下載最新分卷檔案...";
                try {
                    await downloadDatabasePartsFromServer(cloudVersion, totalParts);
                } catch (dlErr) {
                    if (statusEl) statusEl.textContent = `❌ 自動同步下載失敗: ${dlErr.message}`;
                }
            } else {
                // 兜底載入本地快取
                const hasCached = await checkIndexedDBHasCached();
                if (hasCached) {
                    if (statusEl) statusEl.textContent = "⚠️ 連線雲端失敗，正在載入本地歷史快取...";
                    try {
                        await loadCachedDatabase();
                    } catch (cacheLoadErr) {
                        if (statusEl) statusEl.textContent = "❌ 快取載入失敗，且無法連線雲端。";
                    }
                } else {
                    if (statusEl) statusEl.textContent = "❌ 無法與雲端同步，且無本地快取資料。";
                    document.getElementById('manualUploadBtn').classList.remove('hidden');
                }
            }
        }

        function checkIndexedDBHasCached() {
            return new Promise((resolve) => {
                const timer = setTimeout(() => {
                    console.warn("IndexedDB check timed out");
                    resolve(false);
                }, 2000);
                try {
                    const openReq = indexedDB.open("SwimSQL", 1);
                    openReq.onupgradeneeded = e => {
                        if (!e.target.result.objectStoreNames.contains("files")) {
                            e.target.result.createObjectStore("files");
                        }
                    };
                    openReq.onsuccess = e => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains("files")) {
                            clearTimeout(timer);
                            resolve(false);
                            return;
                        }
                        const getReq = db.transaction("files", "readonly").objectStore("files").get("current_db");
                        getReq.onsuccess = () => {
                            clearTimeout(timer);
                            resolve(!!getReq.result);
                        };
                        getReq.onerror = () => {
                            clearTimeout(timer);
                            resolve(false);
                        };
                    };
                    openReq.onerror = () => {
                        clearTimeout(timer);
                        resolve(false);
                    };
                } catch (e) {
                    clearTimeout(timer);
                    resolve(false);
                }
            });
        }

        function loadCachedDatabase() {
            return new Promise((resolve, reject) => {
                const timer = setTimeout(() => reject(new Error("讀取快取超時")), 3000);
                const openReq = indexedDB.open("SwimSQL", 1);
                openReq.onsuccess = e => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains("files")) {
                        clearTimeout(timer);
                        reject(new Error("快取資料表不存在"));
                        return;
                    }
                    try {
                        const tx = db.transaction("files", "readonly");
                        const getReq = tx.objectStore("files").get("current_db");
                        getReq.onsuccess = async () => {
                            try {
                                if (getReq.result) {
                                    const buf = await (getReq.result instanceof Blob ? getReq.result.arrayBuffer() : getReq.result);
                                    worker.postMessage({ type: 'INIT', data: new Uint8Array(buf) });
                                    document.getElementById('dbLoaderArea').style.display = 'none';
                                    clearTimeout(timer);
                                    resolve();
                                } else {
                                    clearTimeout(timer);
                                    reject(new Error("快取為空"));
                                }
                            } catch (err) {
                                clearTimeout(timer);
                                reject(err);
                            }
                        };
                        getReq.onerror = () => {
                            clearTimeout(timer);
                            reject(new Error("讀取失敗"));
                        };
                    } catch (txErr) {
                        clearTimeout(timer);
                        reject(txErr);
                    }
                };
                openReq.onerror = () => {
                    clearTimeout(timer);
                    reject(new Error("打開數據庫失敗"));
                };
            });
        }

        startSystem();
        
        // [SPA 導航優化] 攔截 iframe 內點擊，改以通知 Parent 切換分頁以避免硬刷新
        document.addEventListener('DOMContentLoaded', () => {
            if (window.self !== window.top) {
                document.querySelectorAll('header a, nav a, .header-center-area a').forEach(link => {
                    const href = link.getAttribute('href');
                    if (href && href.endsWith('.html')) {
                        const tabMap = {
                            'query.html': 'query',
                            'index.html': 'query',
                            'manage.html': 'manage',
                            'view_db.html': 'view_db',
                            'wealth.html': 'wealth',
                            'car.html': 'car',
                            'system_messages.html': 'system_messages'
                        };
                        const tabId = tabMap[href];
                        if (tabId) {
                            link.addEventListener('click', (e) => {
                                e.preventDefault();
                                window.parent.postMessage({ switchTab: tabId }, '*');
                            });
                        }
                    }
                });
            }
        });

        function collapseAll() { document.querySelectorAll('.drill-down.active').forEach(p => p.classList.remove('active')); }
        function resetDB() { if (confirm("重置清除資料庫？")) { indexedDB.deleteDatabase("SwimSQL"); localStorage.removeItem('cached_db_time'); location.reload(); } }
        function toggleHistory() { let h = JSON.parse(localStorage.getItem('swim_h')||"[]"), html = `<div id="histModal" style="position:fixed; top:65px; left:16px; right:16px; max-height:400px; overflow-y:auto; background:#1C1C1E; border:1px solid #333; border-radius:12px; padding:12px; z-index:1000;"><div style="display:flex; justify-content:space-between; margin-bottom:12px; border-bottom:0.5px solid #444; padding-bottom:10px;"><span style="color:#D4AF37; font-weight:bold;">歷史紀錄</span><span onclick="document.getElementById('histModal').remove()" style="color:#8E8E93; cursor:pointer;">關閉</span></div>`; h.forEach(n => html += `<div style="display:flex; justify-content:space-between; padding:12px 5px; border-bottom:0.5px solid #222;"><span onclick="selectHist('${n}')" style="flex:1; cursor:pointer; color:#FFF;">${n}</span><span onclick="deleteHistory('${n}')" style="cursor:pointer;">🗑️</span></div>`); document.body.insertAdjacentHTML('beforeend', html+'</div>'); }
        function selectHist(n) { document.getElementById('searchInput').value = n; if(document.getElementById('histModal')) document.getElementById('histModal').remove(); doSearch(); }
        function deleteHistory(n) { let h = JSON.parse(localStorage.getItem('swim_h')||"[]").filter(x => x!==n); localStorage.setItem('swim_h', JSON.stringify(h)); if(document.getElementById('histModal')) document.getElementById('histModal').remove(); toggleHistory(); }
        function saveHistory(n) { if(!n) return; let h = JSON.parse(localStorage.getItem('swim_h')||"[]"); h = [n, ...h.filter(x => x !== n)].slice(0,30); localStorage.setItem('swim_h', JSON.stringify(h)); }

        // --- 自動完成 (Autocomplete) 邏輯 ---
        const searchInput = document.getElementById('searchInput');
        const autocompleteList = document.getElementById('autocomplete-list');
        let currentFocus = -1;
        let isComposing = false;

        searchInput.addEventListener('compositionstart', () => { isComposing = true; });
        searchInput.addEventListener('compositionend', function() {
            isComposing = false;
            updateAutocomplete(this.value);
        });
        searchInput.addEventListener('input', function() {
            if (!isComposing) {
                updateAutocomplete(this.value);
            }
        });

        async function updateAutocomplete(val) {
            val = normalizeName(val);
            closeAutocomplete();
            if (!val || val.length < 1) return;
            if (!worker) return;

            // 查詢符合開頭字元的選手姓名 (已建立 idx_swimming_scores_name 索引，查詢極快)
            const query = `SELECT DISTINCT 姓名 FROM swimming_scores WHERE 姓名 LIKE '${val}%' LIMIT 15`;
            const res = await remoteQuery(query);
            if (!res[0] || !res[0].values) return;

            const names = res[0].values.map(v => v[0]);
            if (names.length === 0) return;

            autocompleteList.innerHTML = '';
            autocompleteList.classList.remove('hidden');
            currentFocus = -1;

            names.forEach(name => {
                const item = document.createElement('div');
                item.className = 'autocomplete-item';
                
                // 將輸入的字串進行跳脫，並加粗高亮顯示
                const escapedVal = val.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                const regex = new RegExp(`^(${escapedVal})`, 'i');
                item.innerHTML = name.replace(regex, '<strong>$1</strong>');
                
                item.addEventListener('click', function() {
                    searchInput.value = name;
                    closeAutocomplete();
                    doSearch();
                });
                autocompleteList.appendChild(item);
            });
        }

        searchInput.addEventListener('keydown', function(e) {
            let items = autocompleteList.querySelectorAll('.autocomplete-item');
            if (e.keyCode === 40) { // 向下鍵
                currentFocus++;
                addActive(items);
            } else if (e.keyCode === 38) { // 向上鍵
                currentFocus--;
                addActive(items);
            } else if (e.keyCode === 13) { // Enter 鍵
                if (currentFocus > -1 && items.length > 0) {
                    e.preventDefault();
                    items[currentFocus].click();
                } else {
                    e.preventDefault();
                    closeAutocomplete();
                    doSearch();
                }
            } else if (e.keyCode === 27) { // Esc 鍵
                closeAutocomplete();
            }
        });

        function addActive(items) {
            if (!items || items.length === 0) return;
            removeActive(items);
            if (currentFocus >= items.length) currentFocus = 0;
            if (currentFocus < 0) currentFocus = items.length - 1;
            items[currentFocus].classList.add('autocomplete-active');
            items[currentFocus].scrollIntoView({ block: 'nearest' });
        }

        function removeActive(items) {
            items.forEach(item => item.classList.remove('autocomplete-active'));
        }

        function closeAutocomplete(e) {
            if (e && (e.target === searchInput || autocompleteList.contains(e.target))) return;
            autocompleteList.classList.add('hidden');
            autocompleteList.innerHTML = '';
            currentFocus = -1;
        }

        document.addEventListener('click', closeAutocomplete);
    </script>
</div>
