    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;700&display=swap');
        
        :root {
            --primary: #D4AF37;
            --primary-light: #F3D078;

            text-align: center;

            margin: 2rem 0;

            gap: 0.25rem;

            border-radius: 16px;

        .col-birth-fixed { width: 55px; text-align: center; flex-shrink: 0; font-family: monospace; }

        .col-meet-fixed { flex-grow: 1; text-align: left; padding-left: 15px; color: #8E8E93; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.9rem; }

        .spinner {

        .col-dist-main { text-decoration: underline; font-weight: 800; cursor: pointer; color: var(--primary); }

        .rank-header-AD { display: flex; justify-content: center; align-items: center; background: #2C2C2E; padding: 10px; border-radius: 12px; margin-bottom: 15px; gap: 20px; border: 0.5px solid #444; }

        <div class="max-w-md w-full p-8 rounded-2xl bg-[#141416] border-2 border-[#D4AF37]/20 shadow-2xl text-center">

    <div id="main"></div>

    <!-- Web Worker JavaScript -->
    <script id="worker-script" type="text/javascript-worker">
        importScripts('SQL_JS_CDN_URL');
        let db = null;
        self.onmessage = async function(e) {
            const { type, data, query, id, wasmUrl } = e.data;
            if (type === 'INIT') {
                try {
                    const SQL = await initSqlJs({ locateFile: f => wasmUrl });
                    db = new SQL.Database(data);
                    // [Auditor] 建立複合索引，加速 LIKE 查詢與排名計算
                    try {
                        db.run('CREATE INDEX IF NOT EXISTS idx_event ON swimming_scores(項目, 性別, 出生年)');
                        db.run('CREATE INDEX IF NOT EXISTS idx_name ON swimming_scores(姓名, 出生年, 性別)');
                    } catch(idxErr) { /* 索引建立失敗不阻斷系統 */ }
                    self.postMessage({ type: 'READY' });
                } catch(err) {
                    self.postMessage({ type: 'ERROR', id, error: err.message });
                }
            } else if (type === 'QUERY') {
                try {
                    // [Auditor 根本修正] db.exec() 回傳 [{columns:[...], values:[[...],...]}]
                    // 與主執行緒所有 res[0].values 存取方式完全吻合
                    // 舊版 getAsObject() 回傳 plain objects，導致 .values 永遠 undefined（查無資料根因）
                    const result = db.exec(query);
                    self.postMessage({ type: 'RESULT', id, data: result });
                } catch (err) {
                    self.postMessage({ type: 'ERROR', id, error: err.message });
                }
            }
        };
    </script>

    <script>
        // 解決 Blob URL Web Worker 載入 CDN 以及跨域問題，使用本機 JS & WASM
        const localJsUrl = new URL('sql-wasm.js', window.location.href).href;
        const localWasmUrl = new URL('sql-wasm.wasm', window.location.href).href;
        
        const workerCode = document.getElementById('worker-script').textContent
            .replace('SQL_JS_CDN_URL', localJsUrl);
            
        const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
        let worker = new Worker(URL.createObjectURL(workerBlob));
        
        // 綁定錯誤監聽，防止靜默失效
        worker.onerror = function(err) {
            console.error("Worker 發生錯誤:", err);
            alert("資料庫引擎載入出錯: " + err.message);
        };

        const callbacks = {};
        let queryId = 0;

        worker.onmessage = function(e) {
            const { type, id, data, error } = e.data;
            if (type === 'READY') {
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('dbLoaderArea').style.display = 'none';
                updateDbStatusInfo();
                // 輸入框有內容才自動搜尋，否則顯示歡迎畫面
                if (document.getElementById('searchInput').value.trim()) {
                    doSearch();
                } else {
                    document.getElementById('main').innerHTML = `
                        <div class="text-center p-10">
                            <div class="text-5xl mb-4">🏊</div>
                            <div class="text-white text-lg font-bold mb-2">資料庫已成功載入</div>
                            <div class="text-gray-400 text-sm">請在上方搜尋列輸入選手姓名進行查詢</div>
                        </div>
                    `;
                }
            } else if (type === 'RESULT') {
                if (callbacks[id]) { callbacks[id].resolve(data); delete callbacks[id]; }
            } else if (type === 'ERROR') {
                if (callbacks[id]) { callbacks[id].reject(new Error(error)); delete callbacks[id]; }
            }
        };

        function remoteQuery(query) {
            return new Promise((resolve, reject) => {
                const id = queryId++;
                callbacks[id] = { resolve, reject };
                worker.postMessage({ type: 'QUERY', id, query });
            });
        }

        // 輔助函數
        const WEEKDAYS = ["一","二","三","四","五","六","日"];
        const toAD = y => parseInt(y) < 1000 ? parseInt(y) + 1911 : parseInt(y);
        const formatToXcode = s => {
            const m = Math.floor(s / 60), sec = (s % 60).toFixed(2);
            return m > 0 ? `${m}:${sec.padStart(5, '0')}` : sec;
        };
        const timeToSec = str => {
            if(!str) return 0;
            const parts = str.split(':');
            return parts.length === 2 ? parseInt(parts[0], 10)*60 + parseFloat(parts[1]) : parseFloat(parts[0]);
        };

        // [Developer+Auditor] baseTimes 抽成全域常數，消除 calculateFinapoint/renderMatrix 重複定義
        const WA_BASE_TIMES = {
            'M': {
                '自由式': { 50: 20.91, 100: 46.80, 200: 102.00, 400: 212.27, 800: 440.47, 1500: 843.10 },
                '仰式':   { 50: 23.71, 100: 51.60, 200: 111.96 },
                '蛙式':   { 50: 25.95, 100: 56.88, 200: 125.96 },
                '蝶式':   { 50: 22.27, 100: 49.45, 200: 110.73 },
                '混合式': { 200: 114.00, 400: 243.84 }
            },
            'F': {
                '自由式': { 50: 23.61, 100: 51.71, 200: 112.98, 400: 235.38, 800: 484.79, 1500: 920.48 },
                '仰式':   { 50: 26.86, 100: 57.13, 200: 123.35 },
                '蛙式':   { 50: 29.30, 100: 64.13, 200: 138.95 },
                '蝶式':   { 50: 24.43, 100: 55.48, 200: 121.81 },
                '混合式': { 200: 126.12, 400: 265.85 }
            }
        };

        // [Developer] SQL 輸入 sanitize：跳脫單引號，防止 SQL Injection
        function sanitizeSql(str) {
            if (typeof str !== 'string') return '';
            return str.replace(/'/g, "''").substring(0, 20); // 最長20字元防止超長注入
        }

        // [Auditor] per-card AbortController，解決切換 Tab 的 Race Condition
        const cardAbortControllers = {};
        // 查詢並顯示資料庫詳細資訊
        async function updateDbStatusInfo() {
            try {
                const countRes = await remoteQuery("SELECT COUNT(*) as cnt FROM swimming_scores");
                const count = (countRes[0] && countRes[0].values) ? countRes[0].values[0][0] : 0;
                
                const openReq = indexedDB.open("SwimSQL", 1);
                openReq.onsuccess = e => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains("files")) return;
                    const getReq = db.transaction("files", "readonly").objectStore("files").get("db_info");
                    getReq.onsuccess = () => {
                        const info = getReq.result || { name: "swim_results_birthday.db", size: 0 };
                        const sizeMB = info.size ? `${(info.size / (1024 * 1024)).toFixed(1)} MB` : "已載入";
                        
                        const dot = document.getElementById('db-info-dot');
                        dot.className = "inline-block w-2.5 h-2.5 rounded-full bg-green-500";
                        let warningHtml = "";
                        if (count === 0) {
                            warningHtml = `
                                <div class="mt-2 text-red-500 bg-red-950/40 border border-red-500/30 p-2 rounded text-xs leading-relaxed max-w-md mx-auto text-left">
                                    ⚠️ 注意：您載入的可能是空白或只含行事曆的資料庫（目前有 0 筆成績）。<br>
                                    請按右上方「重置」按鈕，並重新選取正確的 <b>swim_results_birthday.db</b> (約 290MB) 檔案。
                                </div>
                            `;
                        }
                        
                        document.getElementById('db-info-text').innerHTML = `
                            📁 <b>${info.name}</b> (${sizeMB}) · 
                            📊 <b>${count.toLocaleString()}</b> 筆成績
                            ${warningHtml}
                        `;
                    };
                };
            } catch (err) {
                console.error("無法更新資料庫資訊:", err);
                document.getElementById('db-info-text').textContent = "讀取資料庫資訊失敗";
            }
        }

        // 過濾接力、短水道賽事、非法出生年（合併原始版本 + 資料品質過濾）
        const LC_FILTER = `項目 NOT LIKE '%接力%' AND 項目 NOT LIKE '%(25m)%' AND 項目 NOT LIKE '%短水道%' AND 賽事名稱 NOT LIKE '%短水道%' AND 出生年 IS NOT NULL AND 出生年 != '' AND LENGTH(出生年) >= 3 AND LENGTH(姓名) >= 2`;

        function normalizeName(name) {
            return name.replace(/\s+/g, '').replace(/　/g, '');
        }

        // 泳式 emoji 符號映射
        function getStrokeSymbol(stroke) {
            const map = { '自由式': '🏊', '仰式': '🔄', '蛙式': '🐸', '蝶式': '🦋', '混合式': '🔀' };
            return map[stroke] || '🏊';
        }

        // 產生溫/温, 台/臺, 黃/黄所有可能異體字組合
        function getNameVariants(name) {
            if (!name) return [];
            const map = {
                '温': ['温', '溫'],
                '溫': ['温', '溫'],
                '台': ['台', '臺'],
                '臺': ['台', '臺'],
                '黄': ['黄', '黃'],
                '黃': ['黄', '黃']
            };
            let variants = [''];
            for (let char of name) {
                let options = map[char] || [char];
                let nextVariants = [];
                for (let v of variants) {
                    for (let opt of options) {
                        nextVariants.push(v + opt);
                    }
                }
                variants = nextVariants;
            }
            return variants;
        }

        async function doSearch() {
            const inputVal = normalizeName(document.getElementById('searchInput').value);
            if (!inputVal || !worker) return;
            if (document.getElementById('histModal')) document.getElementById('histModal').remove();
            saveHistory(inputVal);

            const mainDiv = document.getElementById('main');
            mainDiv.innerHTML = '<div class="text-center p-10"><div class="spinner inline-block"></div><div class="mt-2 text-gray-400">正在搜尋資料庫...</div></div>';

            // 取得性別和實際姓名（支援異體字）
            const variants = getNameVariants(inputVal);
            const nameCond = '姓名 IN (' + variants.map(v => `'${sanitizeSql(v)}'`).join(',') + ')';
            const sexRes = await remoteQuery(`SELECT 性別, 姓名 FROM swimming_scores WHERE ${nameCond} AND ${LC_FILTER} LIMIT 1`);
            if (!sexRes[0] || !sexRes[0].values || !sexRes[0].values[0]) {
                mainDiv.innerHTML = '<div class="text-center p-10 text-gray-400">❌ 找不到該選手的個人參賽紀錄，請確認名字是否輸入正確。</div>';
                return;
            }
            const sex = sexRes[0].values[0][0];       // 'M' 或 'F'
            const dbName = sexRes[0].values[0][1];    // 資料庫中實際儲存的姓名
            const safeDbName = sanitizeSql(dbName);
            mainDiv.innerHTML = '';

            const strokes = ['蝶式', '仰式', '蛙式', '自由式', '混合式'];
            for (let [sIdx, stroke] of strokes.entries()) {
                const res = await remoteQuery(`SELECT * FROM swimming_scores WHERE 姓名='${safeDbName}' AND 項目 LIKE '%${stroke}%' AND ${LC_FILTER}`);
                if (!res[0] || !res[0].values || res[0].values.length === 0) continue;

                const card = document.createElement('div');
                card.className = 'stroke-card';
                card.innerHTML = `<div class="stroke-title">${stroke}</div>`;

                const trayInner = document.createElement('div');
                trayInner.style.minWidth = '710px';
                const scrollTray = document.createElement('div');
                scrollTray.style.overflowX = 'auto';

                const cols = res[0].columns;
                let allData = res[0].values.map(v => {
                    let o = {};
                    cols.forEach((col, i) => o[col] = v[i]);
                    o.totalSec = timeToSec(o['成績']);
                    return o;
                });

                const dists = [...new Set(allData.map(r => r['項目'].match(/(\d+)公尺/)?.[1]))].filter(Boolean).sort((a,b) => a-b);

                for (let [dIdx, dist] of dists.entries()) {
                    const dData = allData.filter(r => {
                        const m = r['項目'].match(/(\d+)公尺/);
                        return m && String(m[1]) === String(dist);
                    }).sort((a,b) => a.totalSec - b.totalSec);
                    if (dData.length === 0) continue;

                    const pb = dData[0];
                    const id = `s${sIdx}d${dIdx}`;
                    const waScore = calculateFinapoint(parseInt(dist), stroke, pb.totalSec, sex);

                    const ageG = await getRankData(dist, stroke, dbName, pb['出生年'], sex, false);
                    const natG = await getRankData(dist, stroke, dbName, null, sex, true);
                    const ageIdx = ageG.findIndex(r => variants.includes(r.name) || r.name === dbName);
                    const natIdx = natG.findIndex(r => variants.includes(r.name) || r.name === dbName);
                    const pr = ageIdx >= 0 ? (100 * (ageG.length - ageIdx) / ageG.length) : 0;

                    const row = document.createElement('div');
                    row.className = `race-row ${pr >= 95 ? 'row-gold' : ''}`;
                    row.innerHTML = `
                        <span class="col-dist-main" onclick="toggleD('${id}','trend','${dist}','${stroke}','${dbName}','${pb['出生年']}','${sex}')">${dist}m</span>
                        <span class="col-count-main" onclick="toggleD('${id}','history','${dist}','${stroke}','${dbName}','${pb['出生年']}','${sex}')">${dData.length}場</span>
                        <span class="col-pb-main">PB ${formatToXcode(pb.totalSec)}</span>
                        <span class="col-wa-main">WA:${waScore > 0 ? waScore : '-'}</span>
                        <span class="col-pr-main">PR ${pr.toFixed(1)}%</span>
                        <span class="col-rank-link" onclick="toggleD('${id}','rank','${dist}','${stroke}','${dbName}','${pb['出生年']}','${sex}')">同齡排行${ageIdx >= 0 ? '#'+(ageIdx+1) : '-'}</span>
                        <span class="col-rank-link" onclick="toggleD('${id}','matrix','${dist}','${stroke}',null,null,'${sex}')">年度最佳</span>
                        <span class="col-rank-link" onclick="toggleD('${id}','natRank','${dist}','${stroke}','${dbName}','${pb['出生年']}','${sex}')">全國排行${natIdx >= 0 ? '#'+(natIdx+1) : '-'}</span>
                    `;

                    const dd = document.createElement('div');
                    dd.id = `p-${id}`;
                    dd.className = 'drill-down';
                    dd.innerHTML = `<div id="c-${id}"></div>`;
                    trayInner.appendChild(row);
                    trayInner.appendChild(dd);
                }
                scrollTray.appendChild(trayInner);
                card.appendChild(scrollTray);
                mainDiv.appendChild(card);
            }
        }

        // ── toggleD：點擊展開/收合細節，含 AbortController 防競態 ──
        const drillAbortControllers = {};
        async function toggleD(id, mode, dist, stroke, p1, p2, p3) {
            const p = document.getElementById(`p-${id}`);
            const c = document.getElementById(`c-${id}`);
            if (!p || !c) return;
            // 同 mode 同出生年 → 收合
            if (p.classList.contains('active') && c.getAttribute('data-mode') === mode && c.getAttribute('data-birth') === String(p2)) {
                p.classList.remove('active'); return;
            }
            p.classList.add('active');
            c.setAttribute('data-mode', mode);
            c.setAttribute('data-birth', String(p2));
            c.innerHTML = '<div class="text-center p-4"><div class="spinner inline-block"></div></div>';

            if (drillAbortControllers[id]) drillAbortControllers[id].abort();
            const controller = new AbortController();
            drillAbortControllers[id] = controller;
            const signal = controller.signal;
            const checkAbort = () => { if (signal.aborted) throw new DOMException('Aborted', 'AbortError'); };

            const safeDist   = parseInt(dist, 10);
            const safeStroke = sanitizeSql(stroke);
            const safeP1     = sanitizeSql(p1 || '');

            try {
                if (mode === 'rank' || mode === 'natRank') {
                    const isNat = mode === 'natRank';
                    const sorted = await getRankData(dist, stroke, p1, p2, p3, isNat);
                    checkAbort();
                    sorted.forEach(u => u.wa = calculateFinapoint(dist, stroke, timeToSec(u.raw), p3));
                    const total = sorted.length;
                    const tIdx  = sorted.findIndex(r => getNameVariants(p1 || '').includes(r.name) || r.name === p1);
                    let headerAD = '';
                    if (!isNat) {
                        const yNum = parseInt(String(p2).replace(/\D/g, ''));
                        headerAD = `<div class="rank-header-AD"><span class="year-side" onclick="event.stopPropagation();toggleD('${id}','rank','${dist}','${stroke}','${p1}','${yNum-1}','${p3}')">${toAD(yNum-1)}</span><span class="year-center">${toAD(yNum)}</span><span class="year-side" onclick="event.stopPropagation();toggleD('${id}','rank','${dist}','${stroke}','${p1}','${yNum+1}','${p3}')">${toAD(yNum+1)}</span></div>`;
                    } else {
                        headerAD = `<div class="rank-header-AD"><span class="year-center" style="color:#FFF;">全國排行 (2025-2026)</span></div>`;
                    }
                    let h = `<div class="data-panel p-3">${headerAD}<div style="overflow-x:auto;"><div style="min-width:610px;">`;
                    sorted.slice(0, 30).forEach((r, i) => {
                        const isSelf = getNameVariants(p1||'').includes(r.name) || r.name === p1;
                        h += `<div class="list-row ${isSelf?'row-gold':''}"><span class="col-rank-fixed">#${i+1}</span><span class="col-birth-fixed">${toAD(r.birthYear)}</span><span class="col-name-fixed">${r.name}</span><span class="col-time-fixed">${r.raw}</span><span class="col-wa-list">WA ${r.wa>0?Math.round(r.wa):'-'}</span><span class="col-8code-fixed">${r.fullDate}</span><span class="col-meet-fixed">${r.meet}</span></div>`;
                    });
                    if (total > 0) {
                        h += `<div style="border-top:1px solid #444;margin:12px 0 8px;"></div>`;
                        if (tIdx >= 0) {
                            const u = sorted[tIdx], pr = (100*(total-tIdx)/total).toFixed(1);
                            h += `<div class="list-row row-gold" style="border-bottom:none;padding-bottom:8px;"><span class="col-rank-fixed">#${tIdx+1}</span><span class="col-birth-fixed">${toAD(u.birthYear)}</span><span class="col-name-fixed">${u.name}</span><span class="col-time-fixed">${u.raw}</span><span class="col-wa-list">WA ${Math.round(u.wa)}</span><span class="col-8code-fixed">${u.fullDate}</span><span class="col-meet-fixed">${u.meet}</span></div><div style="color:#A1A1A6;font-size:14px;line-height:1.8;margin-left:5px;"><div>共 ${total.toLocaleString()} 位選手</div><div>${p1} 排名百分位 ${pr}%</div></div>`;
                        }
                    }
                    checkAbort();
                    c.innerHTML = h + '</div></div></div>';

                } else if (mode === 'trend') {
                    const res = await remoteQuery(`SELECT 年份, 成績, 賽事名稱, 出生年, 項目 FROM swimming_scores WHERE 姓名='${safeP1}' AND 項目 LIKE '%${safeDist}公尺%${safeStroke}%' AND ${LC_FILTER} ORDER BY 年份 ASC`);
                    checkAbort();
                    const fV = (res[0]&&res[0].values) ? res[0].values.filter(vv => { const m=vv[4].match(/(\d+)公尺/); return m&&String(m[1])===String(dist); }) : [];
                    const mkD = rs => rs.map(v => ({ x: new Date(v[0].substring(0,4), v[0].substring(4,6)-1, v[0].substring(6,8)), y: timeToSec(v[1]), meet: v[2], date8: v[0] }));
                    const mkA = rs => rs.map(v => ({ x: (parseInt(v[0].substring(0,4))+(parseInt(v[0].substring(4,6))-1)/12)-toAD(v[3]), y: timeToSec(v[1]), meet: v[2], date8: v[0] }));
                    const tD = mkD(fV), aD = mkA(fV);
                    const ageS = await getRankData(dist, stroke, p1, p2, p3, false); checkAbort();
                    const natS = await getRankData(dist, stroke, p1, p2, p3, true);  checkAbort();
                    let ageOpt = '<option value=""># 選擇同齡對手</option>', natOpt = '<option value=""># 選擇全國對手</option>';
                    ageS.slice(0,25).forEach(r => { if(r.name!==p1) ageOpt+=`<option value="${r.name}" style="color:#0A84FF;">${r.name} (${r.raw})</option>`; });
                    natS.slice(0,25).forEach(r => { if(r.name!==p1) natOpt+=`<option value="${r.name}" style="color:#FF3B30;">${r.name} (${r.raw})</option>`; });
                    c.innerHTML = `<div class="p-3" style="background:#000;"><div class="mb-8"><div class="font-bold mb-2">${dist}m 趨勢圖</div><select id="st-${id}" class="w-full bg-[#1C1C1E] border border-[#333] rounded p-2 mb-2 text-[#0A84FF]">${ageOpt}</select><div style="height:250px;border:1px solid #222;padding:5px;"><canvas id="canvas-t-${id}"></canvas></div></div><div><div class="font-bold mb-2">成長對比圖</div><select id="sa-${id}" class="w-full bg-[#1C1C1E] border border-[#333] rounded p-2 mb-2 text-[#FF3B30]">${natOpt}</select><div style="height:250px;border:1px solid #222;padding:5px;"><canvas id="canvas-a-${id}"></canvas></div></div></div>`;
                    const tt = { backgroundColor:'rgba(28,28,30,0.95)', titleFont:{weight:'bold'}, padding:12, displayColors:false, titleColor:ctx=>ctx.tooltip.dataPoints[0].dataset.borderColor, callbacks:{ title:its=>its[0].raw.date8, label:it=>[`賽事: ${it.raw.meet}`,`成績: ${formatToXcode(it.raw.y)}`], labelTextColor:it=>it.dataset.borderColor } };
                    const opt = isT => ({ responsive:true, maintainAspectRatio:false, scales:{ x:{type:isT?'time':'linear',grid:{color:'#333'},ticks:{color:'#FFF'}}, y:{ticks:{callback:v=>formatToXcode(v),color:'#FFF'},grid:{color:'#333'}} }, plugins:{legend:{display:false},tooltip:tt} });
                    const tC = new Chart(document.getElementById(`canvas-t-${id}`), { type:'line', data:{datasets:[{data:tD,borderColor:'#FFF',borderWidth:2.5,pointBackgroundColor:'#FFF',pointRadius:4}]}, options:opt(true) });
                    const aC = new Chart(document.getElementById(`canvas-a-${id}`), { type:'line', data:{datasets:[{data:aD,borderColor:'#FFF',borderWidth:2.5,pointBackgroundColor:'#FFF',pointRadius:4}]}, options:opt(false) });
                    const fetchOpp = async name => {
                        const sN = sanitizeSql(name);
                        const rO = await remoteQuery(`SELECT 年份, 成績, 賽事名稱, 出生年, 項目 FROM swimming_scores WHERE 姓名='${sN}' AND 項目 LIKE '%${safeDist}公尺%${safeStroke}%' AND ${LC_FILTER} ORDER BY 年份 ASC`);
                        return (rO[0]&&rO[0].values) ? rO[0].values.filter(vv=>{ const mm=vv[4].match(/(\d+)公尺/); return mm&&String(mm[1])===String(dist); }) : [];
                    };
                    document.getElementById(`st-${id}`).onchange = async e => { if(!e.target.value) return; const ff=await fetchOpp(e.target.value); tC.data.datasets[1]={label:e.target.value,data:mkD(ff),borderColor:'#0A84FF',borderDash:[5,5],pointBackgroundColor:'#0A84FF',pointRadius:4}; tC.update(); };
                    document.getElementById(`sa-${id}`).onchange = async e => { if(!e.target.value) return; const ff=await fetchOpp(e.target.value); aC.data.datasets[1]={label:e.target.value,data:mkA(ff),borderColor:'#FF3B30',borderDash:[5,5],pointBackgroundColor:'#FF3B30',pointRadius:4}; aC.update(); };

                } else if (mode === 'matrix') {
                    const matHtml = await renderMatrix(dist, stroke, p3);
                    checkAbort();
                    c.innerHTML = matHtml;

                } else if (mode === 'history') {
                    const res = await remoteQuery(`SELECT 年份, 成績, 賽事名稱, 項目 FROM swimming_scores WHERE 姓名='${safeP1}' AND 項目 LIKE '%${safeDist}公尺%${safeStroke}%' AND ${LC_FILTER} ORDER BY 年份 DESC`);
                    checkAbort();
                    const fR = (res[0]&&res[0].values) ? res[0].values.filter(v=>{ const m=v[3].match(/(\d+)公尺/); return m&&String(m[1])===String(dist); }) : [];
                    const minS = fR.length>0 ? Math.min(...fR.map(v=>timeToSec(v[1]))) : 0;
                    let h = '<div class="data-panel"><div style="color:#FFD933;font-weight:bold;margin-bottom:10px;">歷年紀錄</div>';
                    fR.forEach(v => { const s=timeToSec(v[1]); h+=`<div class="list-row ${s===minS?'row-gold':''}"><span class="col-8code-fixed">${v[0]}</span><span class="col-time-fixed">${formatToXcode(s)}</span><span class="col-meet-fixed">${v[2]}</span></div>`; });
                    c.innerHTML = h + '</div>';
                }
            } catch (err) {
                if (err.name === 'AbortError') return;
                if (c && document.body.contains(c)) c.innerHTML = `<div class="text-center p-4 text-red-500">載入失敗: ${err.message}</div>`;
            } finally {
                if (drillAbortControllers[id] === controller) delete drillAbortControllers[id];
            }
        }

        // ── (舊版 toggleDrillDown 已由 toggleD 取代) ──
        async function toggleDrillDown(cardId, dist, stroke, p1, p2, p3) {
            const card = document.getElementById(cardId);
            const wasActive = card.classList.contains('active');
            
            // 收合其他已展開的
            document.querySelectorAll('.drill-down.active').forEach(c => {
                if (c.id !== cardId) c.classList.remove('active');
            });
            
            card.classList.toggle('active');
            
            if (!wasActive) {
                const activeTab = card.querySelector('.tab-btn.active').textContent;
                let mode = 'rank';
                if (activeTab === '趨勢成長') mode = 'trend';
                else if (activeTab === 'WA積分') mode = 'matrix';
                else if (activeTab === '歷年成績') mode = 'history';
                
                await loadTabContent(cardId, mode, dist, stroke, p1, p2, p3);
            }
        }

        async function switchTab(cardId, mode, dist, stroke, p1, p2, p3) {
            const card = document.getElementById(cardId);
            card.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (mode === 'rank' && btn.textContent === '同齡排名') btn.classList.add('active');
                if (mode === 'trend' && btn.textContent === '趨勢成長') btn.classList.add('active');
                if (mode === 'matrix' && btn.textContent === 'WA積分') btn.classList.add('active');
                if (mode === 'history' && btn.textContent === '歷年成績') btn.classList.add('active');
            });
            await loadTabContent(cardId, mode, dist, stroke, p1, p2, p3);
        }

        // 取得特定項目的同齡選手排名資料
        // [Auditor+QA] dist 過濾已推入 SQL 端，消除 Main Thread Regex + 髒資料問題
        async function getRankData(dist, stroke, p1, p2, p3, isNational=false) {
            const safeDist = parseInt(dist, 10);   // [Developer] 確保 dist 是整數，防止注入
            const safeStroke = sanitizeSql(stroke);
            const genderFilter = p3 ? `AND 性別='${sanitizeSql(p3)}'` : '';
            const ageFilter = isNational ? '' : `AND 出生年='${sanitizeSql(p2)}'`;
            // [Auditor] SQL 端精確萃取 dist：用 CAST+INSTR+SUBSTR 解析「公尺」前的數字
            // 同時排除接力項目，防止「100公尺×4接力」污染排名
            const q = `
                SELECT 姓名, 出生年, MIN(成績) as PB, 單位, 賽事名稱, 年份
                FROM swimming_scores
                WHERE 項目 LIKE '%${safeDist}公尺%${safeStroke}%'
                  AND CAST(TRIM(SUBSTR(項目, MAX(1, INSTR(項目,'公尺')-4), 4)) AS INTEGER) = ${safeDist}
                  AND 項目 NOT LIKE '%接力%'
                  AND 項目 NOT LIKE '%×%'
                  ${genderFilter} ${ageFilter}
                  AND ${LC_FILTER}
                GROUP BY 姓名
                ORDER BY PB ASC
            `;
            const res = await remoteQuery(q);
            if (!res[0] || !res[0].values) return [];
            // [Auditor] filter 已在 SQL 完成，Main Thread 不再跑 Regex
            return res[0].values.map(v => ({
                name: v[0],
                birthYear: v[1],
                raw: v[2],
                wa: 0,
                meet: v[4],
                fullDate: v[5]
            }));
        }

        // 動態計算 FINA (WA) 積分 — 改用全域 WA_BASE_TIMES 常數
        function calculateFinapoint(dist, stroke, sec, gender) {
            const b = WA_BASE_TIMES[gender]?.[stroke]?.[dist];
            return (b && sec > 0) ? Math.floor(1000 * Math.pow(b / sec, 3)) : 0;
        }

        async function renderMatrix(dist, stroke, sex) {
            // 年度最佳矩陣（還原原始設計）
            const currentYear = new Date().getFullYear();
            const showYears = []; for (let i = 0; i < 5; i++) showYears.push(String(currentYear - i));
            const groups = ['18以上', '高中', '國中', '國小高年級', '國小中年級', '國小低年級'];
            const genderCond = (sex === 'F' || (sex||'').includes('女')) ? `性別 = 'F'` : `性別 = 'M'`;
            const safeDist = parseInt(dist, 10);
            const safeStroke = sanitizeSql(stroke);
            const res = await remoteQuery(`SELECT 年份, 姓名, 出生年, 成績, 項目 FROM swimming_scores WHERE 項目 LIKE '%${safeDist}公尺%${safeStroke}%' AND ${genderCond} AND ${LC_FILTER} AND 成績 != ''`);
            let matrix = { 'All-Time': {} }; showYears.forEach(y => matrix[y] = {});
            function getG(age) { if(age<9) return '國小低年級'; if(age<=10) return '國小中年級'; if(age<=12) return '國小高年級'; if(age<=14) return '國中'; if(age<=17) return '高中'; return '18以上'; }
            if (res[0] && res[0].values) {
                res[0].values.forEach(v => {
                    const m = v[4].match(/(\d+)公尺/);
                    if (!m || String(m[1]) !== String(dist)) return;
                    const rY = parseInt(String(v[0]).substring(0,4)), sec = timeToSec(v[3]), bY = toAD(v[2]);
                    if (sec <= 0) return;
                    const g = getG(rY - bY);
                    if (matrix[String(rY)] && (!matrix[String(rY)][g] || sec < matrix[String(rY)][g].sec)) matrix[String(rY)][g] = { n: v[1], sec };
                    if (!matrix['All-Time'][g] || sec < matrix['All-Time'][g].sec) matrix['All-Time'][g] = { n: v[1], sec };
                });
            }
            let colorMap = {}, all = new Set();
            Object.values(matrix).forEach(row => groups.forEach(g => { if(row[g]) all.add(row[g].n); }));
            const sz = all.size || 1;
            Array.from(all).sort().forEach((n, i) => colorMap[n] = `hsl(${Math.round(i*(360/sz))}, 85%, 65%)`);
            let h = `<div class="data-panel"><div style="color:#FFD933;font-weight:bold;margin-bottom:10px;">年度最佳矩陣</div><div style="overflow-x:auto;"><table class="matrix-table"><tr style="background:#2C2C2E;"><th>年度</th>${groups.map(g=>`<th>${g}</th>`).join('')}</tr>`;
            ['All-Time', ...showYears].forEach(y => {
                h += `<tr><td class="font-bold">${y}</td>`;
                groups.forEach(g => { const r = matrix[y]?.[g]; h += r ? `<td><b style="color:${colorMap[r.n]};text-shadow:1px 1px 1px #000;">${r.n}</b><br><small>${formatToXcode(r.sec)}</small></td>` : '<td>-</td>'; });
                h += '</tr>';
            });
            return h + '</table></div></div>';
        }

        async function loadTabContent(id, mode, dist, stroke, p1, p2, p3) {
            const c = document.getElementById(`body-${id}`);
            if (!c) return;
            c.innerHTML = `<div class="text-center p-4"><div class="spinner inline-block"></div></div>`;

            // [Auditor] AbortController：若同一張卡被重複觸發，取消上一次未完成的請求
            if (cardAbortControllers[id]) {
                cardAbortControllers[id].abort();
            }
            const controller = new AbortController();
            cardAbortControllers[id] = controller;
            const signal = controller.signal;

            // 每次異步步驟後檢查是否已被中止
            const checkAbort = () => {
                if (signal.aborted) throw new DOMException('Aborted', 'AbortError');
            };

            const safeDist   = parseInt(dist, 10);
            const safeStroke = sanitizeSql(stroke);
            const safeP1     = sanitizeSql(p1);
            const safeP2     = sanitizeSql(p2);
            const safeP3     = sanitizeSql(p3);

            try {
                if (mode === 'rank') {
                    const sorted = await getRankData(dist, stroke, p1, p2, p3, false);
                    checkAbort();
                    sorted.forEach(u => u.wa = calculateFinapoint(dist, stroke, timeToSec(u.raw), p3));
                    const total = sorted.length;
                    const tIdx = sorted.findIndex(u => u.name === p1);

                    let h = `<div class="data-panel"><div style="color:#FFD933; font-weight:bold; margin-bottom:10px;">同齡選手排名 (全國)</div>`;
                    h += `<div class="list-row font-bold text-gray-400" style="border-bottom:1px solid #333;"><span class="col-rank-fixed">#</span><span class="col-birth-fixed">出生年</span><span class="col-name-fixed">姓名</span><span class="col-time-fixed">成績</span><span class="col-wa-list">WA 積分</span><span class="col-8code-fixed">年份</span><span class="col-meet-fixed">賽事名稱</span></div><div style="max-height:220px; overflow-y:auto;">`;
                    sorted.slice(0, 15).forEach((u, i) => {
                        const isSelf = u.name === p1;
                        h += `<div class="list-row ${isSelf?'row-gold':''}"><span class="col-rank-fixed">${i+1}</span><span class="col-birth-fixed">${toAD(u.birthYear)}</span><span class="col-name-fixed">${u.name}</span><span class="col-time-fixed">${u.raw}</span><span class="col-wa-list">${u.wa > 0 ? u.wa : '-'}</span><span class="col-8code-fixed">${u.fullDate}</span><span class="col-meet-fixed">${u.meet}</span></div>`;
                    });
                    if (total > 0) {
                        h += `<div style="border-top:1px solid #444; margin:12px 0 8px 0;"></div>`;
                        if (tIdx >= 0) {
                            const u = sorted[tIdx], pr = (100 * (total - tIdx) / total).toFixed(1);
                            h += `<div class="list-row row-gold" style="border-bottom:none; padding-bottom:8px;"><span class="col-rank-fixed">#${tIdx+1}</span><span class="col-birth-fixed">${toAD(u.birthYear)}</span><span class="col-name-fixed">${u.name}</span><span class="col-time-fixed">${u.raw}</span><span class="col-wa-list">WA ${Math.round(u.wa)}</span><span class="col-8code-fixed">${u.fullDate}</span><span class="col-meet-fixed">${u.meet}</span></div><div style="color:#A1A1A6; font-size:14px; line-height:1.8; margin-left:5px;"><div>共 ${total.toLocaleString()} 位選手</div><div>${p1} 排名百分位 ${pr}%</div></div>`;
                        }
                    }
                    checkAbort();
                    c.innerHTML = h + "</div></div></div>";

                } else if (mode === 'trend') {
                    // [Auditor+QA] dist 過濾推入 SQL，消除 Main Thread .filter() Regex
                    const res = await remoteQuery(`
                        SELECT 年份, 成績, 賽事名稱, 出生年
                        FROM swimming_scores
                        WHERE 姓名='${safeP1}'
                          AND CAST(TRIM(SUBSTR(項目, MAX(1, INSTR(項目,'公尺')-4), 4)) AS INTEGER) = ${safeDist}
                          AND 項目 LIKE '%${safeStroke}%'
                          AND 項目 NOT LIKE '%接力%'
                          AND ${LC_FILTER}
                        ORDER BY 年份 ASC
                    `);
                    checkAbort();
                    const fV = (res[0] && res[0].values) ? res[0].values : [];
                    const mkD = (rs) => rs.map(v => ({ x: new Date(v[0].substring(0,4), v[0].substring(4,6)-1, v[0].substring(6,8)), y: timeToSec(v[1]), meet: v[2], date8: v[0] }));
                    const mkA = (rs) => rs.map(v => ({ x: (parseInt(v[0].substring(0,4)) + (parseInt(v[0].substring(4,6))-1)/12) - toAD(v[3]), y: timeToSec(v[1]), meet: v[2], date8: v[0] }));
                    const tD = mkD(fV), aD = mkA(fV);
                    const ageS = await getRankData(dist, stroke, p1, p2, p3, false);
                    checkAbort();
                    const natS = await getRankData(dist, stroke, p1, p2, p3, true);
                    checkAbort();
                    let ageOpt = '<option value=""># 選擇同齡對手</option>', natOpt = '<option value=""># 選擇全國對手</option>';
                    ageS.slice(0,25).forEach(r => { if(r.name!==p1) ageOpt += `<option value="${r.name}" style="color:#0A84FF;">${r.name} (${r.raw})</option>`; });
                    natS.slice(0,25).forEach(r => { if(r.name!==p1) natOpt += `<option value="${r.name}" style="color:#FF3B30;">${r.name} (${r.raw})</option>`; });

                    c.innerHTML = `<div class="p-3" style="background:#000;"><div class="mb-8"><div class="font-bold mb-2">${dist}m 趨勢圖</div><select id="st-${id}" class="w-full bg-[#1C1C1E] border border-[#333] rounded p-2 mb-2 text-[#0A84FF]">${ageOpt}</select><div style="height:250px; border:1px solid #222; padding:5px;"><canvas id="canvas-t-${id}"></canvas></div></div><div><div class="font-bold mb-2">成長對比圖</div><select id="sa-${id}" class="w-full bg-[#1C1C1E] border border-[#333] rounded p-2 mb-2 text-[#FF3B30]">${natOpt}</select><div style="height:250px; border:1px solid #222; padding:5px;"><canvas id="canvas-a-${id}"></canvas></div></div></div>`;

                    const tt = { backgroundColor: 'rgba(28,28,30,0.95)', titleFont: {weight:'bold'}, padding:12, displayColors:false, titleColor: (ctx) => ctx.tooltip.dataPoints[0].dataset.borderColor, callbacks: { title: (its) => its[0].raw.date8, label: (it) => [`賽事: ${it.raw.meet}`, `成績: ${formatToXcode(it.raw.y)}`], labelTextColor: (it) => it.dataset.borderColor } };
                    const opt = (isT) => ({ responsive: true, maintainAspectRatio: false, scales: { x: { type: isT?'time':'linear', grid: { color:'#333' }, ticks: { color:'#FFF' } }, y: { ticks: { callback: v => formatToXcode(v), color:'#FFF' }, grid: { color:'#333' } } }, plugins: { legend: { display: false }, tooltip: tt } });
                    const tC = new Chart(document.getElementById(`canvas-t-${id}`), { type: 'line', data: { datasets: [{ data: tD, borderColor: '#FFF', borderWidth: 2.5, pointBackgroundColor: '#FFF', pointRadius: 4 }] }, options: opt(true) });
                    const aC = new Chart(document.getElementById(`canvas-a-${id}`), { type: 'line', data: { datasets: [{ data: aD, borderColor: '#FFF', borderWidth: 2.5, pointBackgroundColor: '#FFF', pointRadius: 4 }] }, options: opt(false) });

                    // [QA+Auditor] 趨勢對手選擇也推入 SQL 過濾，不再 Main Thread Regex
                    const fetchOpponent = async (name) => {
                        const safeN = sanitizeSql(name);
                        const rO = await remoteQuery(`
                            SELECT 年份, 成績, 賽事名稱, 出生年
                            FROM swimming_scores
                            WHERE 姓名='${safeN}'
                              AND CAST(TRIM(SUBSTR(項目, MAX(1, INSTR(項目,'公尺')-4), 4)) AS INTEGER) = ${safeDist}
                              AND 項目 LIKE '%${safeStroke}%'
                              AND 項目 NOT LIKE '%接力%'
                              AND ${LC_FILTER}
                            ORDER BY 年份 ASC
                        `);
                        return (rO[0] && rO[0].values) ? rO[0].values : [];
                    };
                    document.getElementById(`st-${id}`).onchange = async (e) => {
                        const ff = await fetchOpponent(e.target.value);
                        tC.data.datasets[1] = { label: e.target.value, data: mkD(ff), borderColor: '#0A84FF', borderDash: [5,5], pointBackgroundColor: '#0A84FF', pointRadius: 4 };
                        tC.update();
                    };
                    document.getElementById(`sa-${id}`).onchange = async (e) => {
                        const ff = await fetchOpponent(e.target.value);
                        aC.data.datasets[1] = { label: e.target.value, data: mkA(ff), borderColor: '#FF3B30', borderDash: [5,5], pointBackgroundColor: '#FF3B30', pointRadius: 4 };
                        aC.update();
                    };

                } else if (mode === 'matrix') {
                    const matHtml = await renderMatrix(dist, stroke, p3);
                    checkAbort();
                    c.innerHTML = matHtml;

                } else if (mode === 'history') {
                    // [Auditor+QA] dist 過濾推入 SQL
                    const res = await remoteQuery(`
                        SELECT 年份, 成績, 賽事名稱
                        FROM swimming_scores
                        WHERE 姓名='${safeP1}'
                          AND CAST(TRIM(SUBSTR(項目, MAX(1, INSTR(項目,'公尺')-4), 4)) AS INTEGER) = ${safeDist}
                          AND 項目 LIKE '%${safeStroke}%'
                          AND 項目 NOT LIKE '%接力%'
                          AND ${LC_FILTER}
                        ORDER BY 年份 DESC
                    `);
                    checkAbort();
                    const fR = (res[0] && res[0].values) ? res[0].values : [];
                    const minS = fR.length > 0 ? Math.min(...fR.map(v => timeToSec(v[1]))) : 0;
                    let h = `<div class="data-panel"><div style="color:#FFD933; font-weight:bold; margin-bottom:10px;">歷年紀錄</div>`;
                    fR.forEach(v => { const s = timeToSec(v[1]); h += `<div class="list-row ${s===minS?'row-gold':''}"><span class="col-8code-fixed">${v[0]}</span><span class="col-time-fixed">${formatToXcode(s)}</span><span class="col-meet-fixed">${v[2]}</span></div>`; });
                    c.innerHTML = h + "</div>";
                }
            } catch (err) {
                if (err.name === 'AbortError') return; // [Auditor] 正常中止，靜默退出
                if (c && document.body.contains(c)) {
                    c.innerHTML = `<div class="text-center p-4 text-red-500">載入失敗: ${err.message}</div>`;
                }
            } finally {
                // 清理 controller 參照
                if (cardAbortControllers[id] === controller) {
                    delete cardAbortControllers[id];
                }
            }
        }

        // 手動載入本機 DB
        function showUploadPrompt() {
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('dbLoaderArea').style.display = 'flex';
            document.getElementById('progressContainer').classList.remove('hidden');
            const statusEl = document.getElementById('loaderStatus');
            statusEl.textContent = "未偵測到本機快取資料庫。請選取您的 swim_results_birthday.db 檔案進行載入。";
            document.getElementById('progressBar').style.width = '0%';
        }

        async function handleDBUpload(files) { 
            if(!files[0]) return; 
            document.getElementById('progressContainer').classList.remove('hidden'); 
            const statusEl = document.getElementById('loaderStatus');
            const progressBar = document.getElementById('progressBar');
            progressBar.style.width = '50%';
            statusEl.textContent = "正在讀取本機檔案...";
            
            try {
                const buffer = await files[0].arrayBuffer(); 
                statusEl.textContent = "正在快取資料庫至瀏覽器 (IndexedDB)...";
                const openReq = indexedDB.open("SwimSQL", 1); 
                openReq.onupgradeneeded = e => {
                    if (!e.target.result.objectStoreNames.contains("files")) {
                        e.target.result.createObjectStore("files");
                    }
                }; 
                openReq.onsuccess = e => {
                    const db = e.target.result;
                    const tx = db.transaction("files", "readwrite");
                    tx.objectStore("files").put(files[0], "current_db");
                    // 儲存資料庫元數據，供狀態列讀取
                    const info = { name: files[0].name, size: files[0].size, loadedAt: new Date().toISOString() };
                    tx.objectStore("files").put(info, "db_info");
                    tx.oncomplete = () => {
                        progressBar.style.width = '100%';
                        statusEl.textContent = "載入完成！正在重啟系統...";
                        // 使用 Transferable Objects 零拷貝傳輸 buffer，防止手機內存崩潰
                        worker.postMessage({ type: 'INIT', data: new Uint8Array(buffer), wasmUrl: localWasmUrl }, [buffer]);
                    };
                }; 
            } catch (err) {
                statusEl.textContent = `檔案讀取失敗: ${err.message}`;
            }
        }

        async function startSystem() { 
            try {
                const openReq = indexedDB.open("SwimSQL", 1); 
                openReq.onupgradeneeded = e => {
                    if (!e.target.result.objectStoreNames.contains("files")) {
                        e.target.result.createObjectStore("files");
                    }
                };
                openReq.onblocked = () => {
                    console.warn("IndexedDB 被其他分頁占用，請關閉其他分頁");
                    const statusEl = document.getElementById('loaderStatus') || { textContent: "" };
                    statusEl.textContent = "⚠️ 偵測到資料庫被其他分頁占用。請關閉其他相關分頁，然後重新整理本頁面。";
                    showUploadPrompt();
                };
                openReq.onsuccess = e => { 
                    try {
                        const db = e.target.result;
                        if(!db.objectStoreNames.contains("files")) {
                            showUploadPrompt();
                            return;
                        }
                        const getReq = db.transaction("files", "readonly").objectStore("files").get("current_db"); 
                        getReq.onsuccess = async () => { 
                            try {
                                if (getReq.result) { 
                                    const fileBlob = getReq.result;
                                    const buf = await (fileBlob instanceof Blob ? fileBlob.arrayBuffer() : fileBlob); 
                                    // 使用 Transferable Objects 零拷貝傳輸 buffer，防止手機內存崩潰
                                    worker.postMessage({ type: 'INIT', data: new Uint8Array(buf), wasmUrl: localWasmUrl }, [buf]); 
                                } else {
                                    showUploadPrompt();
                                }
                            } catch (bufErr) {
                                console.error("讀取快取資料庫失敗:", bufErr);
                                showUploadPrompt();
                            }
                        };
                        getReq.onerror = () => { showUploadPrompt(); };
                    } catch (txErr) {
                        console.error("建立資料庫唯讀 Transaction 失敗:", txErr);
                        showUploadPrompt();
                    }
                };
                openReq.onerror = e => { 
                    console.error("打開 IndexedDB 失敗:", e);
                    showUploadPrompt(); 
                };
            } catch (err) {
                console.error("啟動系統時發生異常:", err);
                showUploadPrompt();
            }
        }

        startSystem();
        function collapseAll() { document.querySelectorAll('.drill-down.active').forEach(p => p.classList.remove('active')); }
        function resetDB() {
            if (confirm("重置清除資料庫快取？")) {
                // 先終止 Worker 釋放連線，防止 deleteDatabase 進入 blocked 狀態
                if (typeof worker !== 'undefined' && worker) {
                    worker.terminate();
                    worker = null;
                }
                const req = indexedDB.deleteDatabase("SwimSQL");
                req.onsuccess = () => location.reload();
                req.onerror = () => alert("重置失敗，請手動清除瀏覽器快取");
                req.onblocked = () => alert("資料庫被占用，請關閉其他分頁後重試");
            }
        }
        function toggleHistory() {
            if (document.getElementById('histModal')) { document.getElementById('histModal').remove(); return; }
            let h = JSON.parse(localStorage.getItem('swim_h')||"[]");
            const modal = document.createElement('div');
            modal.id = 'histModal';
            modal.style.cssText = 'position:fixed; top:65px; left:16px; right:16px; max-height:400px; overflow-y:auto; background:#1C1C1E; border:1px solid #333; border-radius:12px; padding:12px; z-index:1000;';
            const header = document.createElement('div');
            header.style.cssText = 'display:flex; justify-content:space-between; margin-bottom:12px; border-bottom:0.5px solid #444; padding-bottom:10px;';
            const title = document.createElement('span');
            title.style.cssText = 'color:#D4AF37; font-weight:bold;'; title.textContent = '歷史紀錄';
            const close = document.createElement('span');
            close.style.cssText = 'color:#8E8E93; cursor:pointer;'; close.textContent = '關閉';
            close.onclick = () => modal.remove();
            header.appendChild(title); header.appendChild(close); modal.appendChild(header);
            h.forEach(n => {
                const row = document.createElement('div');
                row.style.cssText = 'display:flex; justify-content:space-between; padding:12px 5px; border-bottom:0.5px solid #222;';
                const nameSpan = document.createElement('span');
                nameSpan.style.cssText = 'flex:1; cursor:pointer; color:#FFF;';
                nameSpan.textContent = n;  // 使用 textContent 避免 XSS
                nameSpan.onclick = () => selectHist(n);
                const delSpan = document.createElement('span');
                delSpan.style.cursor = 'pointer'; delSpan.textContent = '🗑️';
                delSpan.onclick = () => deleteHistory(n);
                row.appendChild(nameSpan); row.appendChild(delSpan); modal.appendChild(row);
            });
            document.body.appendChild(modal);
        }
        function selectHist(n) { document.getElementById('searchInput').value = n; if(document.getElementById('histModal')) document.getElementById('histModal').remove(); doSearch(); }
        function deleteHistory(n) { let h = JSON.parse(localStorage.getItem('swim_h')||"[]").filter(x => x!==n); localStorage.setItem('swim_h', JSON.stringify(h)); if(document.getElementById('histModal')) document.getElementById('histModal').remove(); toggleHistory(); }
        function saveHistory(n) { if(!n) return; let h = JSON.parse(localStorage.getItem('swim_h')||"[]"); h = [n, ...h.filter(x => x !== n)].slice(0,30); localStorage.setItem('swim_h', JSON.stringify(h)); }

        // --- 自動完成 (Autocomplete) 邏輯 ---
        const searchInput = document.getElementById('searchInput');
        const autocompleteList = document.getElementById('autocomplete-list');
        let currentFocus = -1;
        let isComposing = false;

        searchInput.addEventListener('compositionstart', () => { isComposing = true; });
        searchInput.addEventListener('compositionend', function() {
            isComposing = false;
            updateAutocomplete(this.value);
        });
        searchInput.addEventListener('input', function() {
            if (!isComposing) {
                updateAutocomplete(this.value);
            }
        });

        async function updateAutocomplete(val) {
            val = normalizeName(val);
            closeAutocomplete();
            if (!val || val.length < 1) return;
            if (!worker) return;

            const variants = getNameVariants(val);
            // [Developer] sanitizeSql 防止 autocomplete 輸入注入
            const nameCond = "(" + variants.map(v => `姓名 LIKE '${sanitizeSql(v)}%'`).join(" OR ") + ")";
            const query = `SELECT DISTINCT 姓名 FROM swimming_scores WHERE ${nameCond} LIMIT 15`;
            const res = await remoteQuery(query);
            if (!res[0] || !res[0].values) return;

            const names = res[0].values.map(v => v[0]);
            if (names.length === 0) return;

            autocompleteList.innerHTML = '';
            autocompleteList.classList.remove('hidden');
            currentFocus = -1;

            names.forEach(name => {
                const item = document.createElement('div');
                item.className = 'autocomplete-item';
                
                const escapedVal = val.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                const regex = new RegExp(`^(${escapedVal})`, 'i');
                item.innerHTML = name.replace(regex, '<strong>$1</strong>');
                
                item.addEventListener('click', function() {
                    searchInput.value = name;
                    closeAutocomplete();
                    doSearch();
                });
                autocompleteList.appendChild(item);
            });
        }

        searchInput.addEventListener('keydown', function(e) {
            let items = autocompleteList.querySelectorAll('.autocomplete-item');
            if (e.keyCode === 40) {
                currentFocus++;
                addActive(items);
            } else if (e.keyCode === 38) {
                currentFocus--;
                addActive(items);
            } else if (e.keyCode === 13) {
                if (currentFocus > -1 && items.length > 0) {
                    e.preventDefault();
                    items[currentFocus].click();
                } else {
                    e.preventDefault();
                    closeAutocomplete();
                    doSearch();
                }
            } else if (e.keyCode === 27) {
                closeAutocomplete();
            }
        });

        function addActive(items) {
            if (!items || items.length === 0) return;
            removeActive(items);
            if (currentFocus >= items.length) currentFocus = 0;
            if (currentFocus < 0) currentFocus = items.length - 1;
            items[currentFocus].classList.add('autocomplete-active');
            items[currentFocus].scrollIntoView({ block: 'nearest' });
        }

        function removeActive(items) {
            items.forEach(item => item.classList.remove('autocomplete-active'));
        }

        function closeAutocomplete(e) {
            if (e && (e.target === searchInput || autocompleteList.contains(e.target))) return;
            autocompleteList.classList.add('hidden');
            autocompleteList.innerHTML = '';
            currentFocus = -1;
        }

        document.addEventListener('click', closeAutocomplete);
    </script>
