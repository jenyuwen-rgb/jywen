<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>游泳成績查詢 v26.0 (AD Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        body { background-color: #000; color: #FFF; font-family: -apple-system, "SF Pro", "SF Mono", monospace; padding-bottom: 200px; }
        .nav-header { background: #121212; border-bottom: 0.5px solid #333; padding: 12px 8px; display: flex; align-items: center; gap: 8px; position: sticky; top: 0; z-index: 100; width: 100%; }
        #searchInput { background: transparent; flex: 1; min-width: 0; outline: none; font-weight: bold; font-size: 18px; color: white; }
        .header-title { text-align: center; color: #D4AF37; font-size: 32px; font-weight: 900; margin: 15px 0; }
        .stroke-card { background-color: #1C1C1E; border: 0.5px solid #38383A; border-radius: 12px; margin: 16px 12px; padding: 16px; }
        .stroke-title { font-size: 26px; font-weight: 900;  margin-bottom: 2px; }
        
        .race-row { display: grid; grid-template-columns: 55px 50px 105px 80px 85px 115px 85px 115px; align-items: center; padding: 3px 0; border-bottom: 0.5px solid #38383A; font-size: 14px; color: #FFF; white-space: nowrap; }
        .col-dist-main { text-decoration: underline; font-weight: 800; cursor: pointer; }
        .col-count-main { text-decoration: underline; cursor: pointer; font-size: 12px; }
        .col-pb-main { font-family: monospace; font-weight: bold; }
        .col-wa-main { font-size: 13px; }
        .col-pr-main { font-weight: 600; }
        .col-rank-link { text-decoration: underline; cursor: pointer; }
        .row-gold, .row-gold span, .row-gold b, .row-gold div { color: #D4AF37 !important; opacity: 1 !important; }

        .list-row { display: flex; align-items: center; padding: 4px 0; border-bottom: 1px solid #111; font-size: 14px; color: #FFF; white-space: nowrap; }
        .col-rank-fixed { width: 35px; flex-shrink: 0; font-family: monospace; text-align: left; }
        .col-birth-fixed { width: 50px; flex-shrink: 0; color: #8E8E93; font-size: 12px; text-align: center; font-family: monospace; }
        .col-name-fixed { width: 85px; flex-shrink: 0; font-weight: bold; margin-left: 2px; }
        .col-time-fixed { width: 80px; flex-shrink: 0; font-family: monospace; font-weight: bold; }
        .col-wa-list { width: 75px; flex-shrink: 0; font-family: monospace; }
        .col-8code-fixed { width: 85px; flex-shrink: 0; font-family: monospace; }
        .col-meet-fixed { flex: 1; overflow: hidden; text-overflow: ellipsis; padding-left: 10px; }

        .rank-header-AD { display: flex; justify-content: center; align-items: center; background: #2C2C2E; padding: 10px; border-radius: 12px; margin-bottom: 15px; gap: 20px; border: 0.5px solid #444; }
        .year-side { color: #666; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .year-side:hover { color: #D4AF37; }
        .year-center { color: #D4AF37; font-weight: 900; font-size: 18px; }
        .year-center::after { content: "年出生 排行"; color: #8E8E93; font-size: 12px; font-weight: normal; margin-left: 4px; }

        .matrix-table { width: 100%; min-width: 750px; border-collapse: collapse; text-align: center; }
        .matrix-table td { padding: 8px 4px; border-bottom: 0.5px solid #222; }
        .drill-down { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .drill-down.active { max-height: 30000px; padding: 15px 0; }
        
        #queryLoader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; opacity: 0; transition: opacity 0.3s ease; }
        #lottie-swimmer { width: 320px; height: 320px; margin-bottom: -40px; }
    </style>
</head>

            const { type, data, query, id } = e.data;
            if (type === 'INIT') {
                const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${f}` });
                db = new SQL.Database(data);
                self.postMessage({ type: 'READY' });
            } else if (type === 'QUERY') {
                try {
                    const res = db.exec(query);
                    self.postMessage({ type: 'RESULT', id: id, res: res });
                } catch (err) { self.postMessage({ type: 'ERROR', id: id, msg: err.message }); }
            }
        };
    </script>

            const bF = { "蝶式": {50:25.0, 100:55.5, 200:122.0}, "仰式": {50:27.1, 100:57.4, 200:125.0}, "蛙式": {50:30.0, 100:65.3, 200:143.0}, "自由式": {50:23.9, 100:51.7, 200:112.0, 400:240.0, 800:490.0, 1500:940.0}, "混合式": {200:122.6, 400:259.0} };

        async function getRankData(dist, stroke, name, birth, sex, isNational) {
            // ✅ 修正 1：SQL 使用數字緊連公尺
            const pattern = `%${dist}公尺%${stroke}%`;
            let filter = `項目 LIKE '${pattern}' AND 性別 = '${sex}' AND ${LC_FILTER}`;
            if (isNational) filter += ` AND (年份 LIKE '2026%' OR 年份 LIKE '2025%')`; else filter += ` AND 出生年='${birth}'`;
            const res = await remoteQuery(`SELECT 姓名, 成績, 年份, 賽事名稱, 出生年, 項目 FROM swimming_scores WHERE ${filter}`);
            if (!res[0]) return [];
            const pBs = {};
            res[0].values.forEach(v => {
                // ✅ 修正 2：JS 端再次使用 Regex 提取數字並「嚴格比對」，徹底解決 1500 包含 50 的問題
                const m = v[5].match(/(\d+)公尺/);
                if (!m || m[1] !== String(dist)) return;

                const pN = v[0], sec = timeToSec(v[1]);
                if (sec > 0 && (!pBs[pN] || sec < pBs[pN].sec)) pBs[pN] = { name: pN, sec, raw: formatToXcode(sec), fullDate: v[2], meet: v[3], wa: getWA(dist, stroke, v[1], sex), birthYear: v[4] };
            });
            return Object.values(pBs).sort((a,b) => a.sec - b.sec);
        }

        async function renderMatrix(dist, stroke, sex) {
            const currentYear = new Date().getFullYear();
            const showYears = []; for (let i = 0; i < 5; i++) { showYears.push((currentYear - i).toString()); }
            const groups = ["18以上", "高中", "國中", "國小高年級", "國小中年級", "國小低年級"];
            const res = await remoteQuery(`SELECT 年份, 姓名, 出生年, 成績, 項目 FROM swimming_scores WHERE 項目 LIKE '%${dist}公尺%${stroke}%' AND 性別 = '${sex.includes("男")?"男":"女"}' AND ${LC_FILTER} AND 成績 != ''`);
            let matrix = { "All-Time": {} }; showYears.forEach(y => matrix[y] = {});
            function getG(age) { if (age < 9) return "國小低年級"; if (age <= 10) return "國小中年級"; if (age <= 12) return "國小高年級"; if (age <= 14) return "國中"; if (age <= 17) return "高中"; return "18以上"; }
            if (res[0]) {
                res[0].values.forEach(v => {
                    // ✅ 修正 3：矩陣同樣實施數字全匹配
                    const m = v[4].match(/(\d+)公尺/);
                    if (!m || m[1] !== String(dist)) return;

                    const rY = parseInt(String(v[0]).substring(0,4)), sec = timeToSec(v[3]), bY = toAD(v[2]);
                    const g = getG(rY - bY);
                    if (matrix[rY] && (!matrix[rY][g] || sec < matrix[rY][g].sec)) matrix[rY][g] = { n: v[1], sec };
                    if (!matrix["All-Time"][g] || sec < matrix["All-Time"][g].sec) matrix["All-Time"][g] = { n: v[1], sec };
                });
            }
            let colorMap = {}, all = new Set();
            Object.values(matrix).forEach(row => groups.forEach(g => { if(row[g]) all.add(row[g].n); }));
            Array.from(all).sort().forEach((n, i) => colorMap[n] = `hsl(${(i * (360 / all.size))}, 85%, 65%)`);
            let h = `<div class="data-panel"><div style="color:#FFD933; font-weight:bold; margin-bottom:10px;">年度最佳矩陣</div><div style="overflow-x:auto;"><table class="matrix-table"><tr style="background:#2C2C2E;"><th>年度</th>${groups.map(g=>`<th>${g}</th>`).join('')}</tr>`;
            ["All-Time", ...showYears].forEach(y => { h += `<tr><td class="font-bold">${y}</td>`; groups.forEach(g => { const r = matrix[y][g]; h += r ? `<td><b style="color:${colorMap[r.n]}; text-shadow:1px 1px 1px #000;">${r.n}</b><br><small>${formatToXcode(r.sec)}</small></td>` : `<td>-</td>`; }); h += `</tr>`; });
            return h + "</table></div></div>";
        }

        async function toggleD(id, mode, dist, stroke, p1, p2, p3) {
            const p = document.getElementById(`p-${id}`), c = document.getElementById(`c-${id}`);
            if (p.classList.contains('active') && c.getAttribute('data-mode') === mode && c.getAttribute('data-birth') === p2) { p.classList.remove('active'); return; }
            p.classList.add('active'); c.setAttribute('data-mode', mode); c.setAttribute('data-birth', p2);
            if (mode === 'rank' || mode === 'natRank') {
                const sorted = await getRankData(dist, stroke, p1, p2, p3, mode==='natRank');
                const adYear = toAD(p2);
                let headerAD = "";
                if (mode === 'rank') {
                    const yNum = parseInt(p2.replace(/\D/g, ''));
                    headerAD = `<div class="rank-header-AD"><span class="year-side" onclick="event.stopPropagation(); toggleD('${id}','rank','${dist}','${stroke}','${p1}','${yNum-1}','${p3}')">${toAD(yNum-1)}</span><span class="year-center">${adYear}</span><span class="year-side" onclick="event.stopPropagation(); toggleD('${id}','rank','${dist}','${stroke}','${p1}','${yNum+1}','${p3}')">${toAD(yNum+1)}</span></div>`;
                } else {
                    headerAD = `<div class="rank-header-AD"><span class="year-center" style="color:#FFF;">全國排行 (2025-2026)</span></div>`;
                }
                let h = `<div class="data-panel p-3">${headerAD}<div style="overflow-x:auto;"><div style="min-width:610px;">`;
                sorted.slice(0, 30).forEach((r, i) => h += `<div class="list-row ${r.name===p1?'row-gold':''}"><span class="col-rank-fixed">#${i+1}</span><span class="col-birth-fixed">${toAD(r.birthYear)}</span><span class="col-name-fixed">${r.name}</span><span class="col-time-fixed">${r.raw}</span><span class="col-wa-list">WA ${Math.round(r.wa)}</span><span class="col-8code-fixed">${r.fullDate}</span><span class="col-meet-fixed">${r.meet}</span></div>`);
                const total = sorted.length, tIdx = sorted.findIndex(r => r.name === p1);
                if (total > 0) {
                    h += `<div style="border-top:1px solid #444; margin:12px 0 8px 0;"></div>`;
                    if (tIdx >= 0) {
                        const u = sorted[tIdx], pr = (100 * (total - tIdx) / total).toFixed(1);
                        h += `<div class="list-row row-gold" style="border-bottom:none; padding-bottom:8px;"><span class="col-rank-fixed">#${tIdx+1}</span><span class="col-birth-fixed">${toAD(u.birthYear)}</span><span class="col-name-fixed">${u.name}</span><span class="col-time-fixed">${u.raw}</span><span class="col-wa-list">WA ${Math.round(u.wa)}</span><span class="col-8code-fixed">${u.fullDate}</span><span class="col-meet-fixed">${u.meet}</span></div><div style="color:#A1A1A6; font-size:14px; line-height:1.8; margin-left:5px;"><div>共 ${total.toLocaleString()} 位選手</div><div>${p1} 排名百分位 ${pr}%</div></div>`;
                    }
                }
                c.innerHTML = h + "</div></div></div>";
            } else if (mode === 'trend') {
                const res = await remoteQuery(`SELECT 年份, 成績, 賽事名稱, 出生年, 項目 FROM swimming_scores WHERE 姓名='${p1}' AND 項目 LIKE '%${dist}公尺%${stroke}%' AND ${LC_FILTER} ORDER BY 年份 ASC`);
                const fV = res[0].values.filter(vv => { const m = vv[4].match(/(\d+)公尺/); return m && String(m[1]) === String(dist); });
                const mkD = (rs) => rs.map(v => ({ x: new Date(v[0].substring(0,4), v[0].substring(4,6)-1, v[0].substring(6,8)), y: timeToSec(v[1]), meet: v[2], date8: v[0] }));
                const mkA = (rs) => rs.map(v => ({ x: (parseInt(v[0].substring(0,4)) + (parseInt(v[0].substring(4,6))-1)/12) - toAD(v[3]), y: timeToSec(v[1]), meet: v[2], date8: v[0] }));
                const tD = mkD(fV), aD = mkA(fV);
                const ageS = await getRankData(dist, stroke, p1, p2, p3, false), natS = await getRankData(dist, stroke, p1, p2, p3, true);
                let ageOpt = '<option value=""># 選擇同齡對手</option>', natOpt = '<option value=""># 選擇全國對手</option>';
                ageS.slice(0,25).forEach(r => { if(r.name!==p1) ageOpt += `<option value="${r.name}" style="color:#0A84FF;">${r.name} (${r.raw})</option>`; });
                natS.slice(0,25).forEach(r => { if(r.name!==p1) natOpt += `<option value="${r.name}" style="color:#FF3B30;">${r.name} (${r.raw})</option>`; });
                c.innerHTML = `<div class="p-3" style="background:#000;"><div class="mb-8"><div class="font-bold mb-2">${dist}m 趨勢圖</div><select id="st-${id}" class="w-full bg-[#1C1C1E] border border-[#333] rounded p-2 mb-2 text-[#0A84FF]">${ageOpt}</select><div style="height:250px; border:1px solid #222; padding:5px;"><canvas id="canvas-t-${id}"></canvas></div></div><div><div class="font-bold mb-2">成長對比圖</div><select id="sa-${id}" class="w-full bg-[#1C1C1E] border border-[#333] rounded p-2 mb-2 text-[#FF3B30]">${natOpt}</select><div style="height:250px; border:1px solid #222; padding:5px;"><canvas id="canvas-a-${id}"></canvas></div></div></div>`;
                const tt = { backgroundColor: 'rgba(28,28,30,0.95)', titleFont: {weight:'bold'}, padding:12, displayColors:false, titleColor: (ctx) => ctx.tooltip.dataPoints[0].dataset.borderColor, callbacks: { title: (its) => its[0].raw.date8, label: (it) => [`賽事: ${it.raw.meet}`, `成績: ${formatToXcode(it.raw.y)}`], labelTextColor: (it) => it.dataset.borderColor } };
                const opt = (isT) => ({ responsive: true, maintainAspectRatio: false, scales: { x: { type: isT?'time':'linear', grid: { color:'#333' }, ticks: { color:'#FFF' } }, y: { ticks: { callback: v => formatToXcode(v), color:'#FFF' }, grid: { color:'#333' } } }, plugins: { legend: { display: false }, tooltip: tt } });
                const tC = new Chart(document.getElementById(`canvas-t-${id}`), { type: 'line', data: { datasets: [{ data: tD, borderColor: '#FFF', borderWidth: 2.5, pointBackgroundColor: '#FFF', pointRadius: 4 }] }, options: opt(true) });
                const aC = new Chart(document.getElementById(`canvas-a-${id}`), { type: 'line', data: { datasets: [{ data: aD, borderColor: '#FFF', borderWidth: 2.5, pointBackgroundColor: '#FFF', pointRadius: 4 }] }, options: opt(false) });
                document.getElementById(`st-${id}`).onchange = async (e) => { 
                    const rO = await remoteQuery(`SELECT 年份, 成績, 賽事名稱, 出生年, 項目 FROM swimming_scores WHERE 姓名='${e.target.value}' AND 項目 LIKE '%${dist}公尺%${stroke}%' AND ${LC_FILTER} ORDER BY 年份 ASC`); 
                    const ff = rO[0].values.filter(vv => { const mm = vv[4].match(/(\d+)公尺/); return mm && String(mm[1]) === String(dist); });
                    tC.data.datasets[1] = { label: e.target.value, data: mkD(ff), borderColor: '#0A84FF', borderDash: [5,5], pointBackgroundColor: '#0A84FF', pointRadius: 4 }; tC.update(); 
                };
                document.getElementById(`sa-${id}`).onchange = async (e) => { 
                    const rO = await remoteQuery(`SELECT 年份, 成績, 賽事名稱, 出生年, 項目 FROM swimming_scores WHERE 姓名='${e.target.value}' AND 項目 LIKE '%${dist}公尺%${stroke}%' AND ${LC_FILTER} ORDER BY 年份 ASC`); 
                    const ff = rO[0].values.filter(vv => { const mm = vv[4].match(/(\d+)公尺/); return mm && String(mm[1]) === String(dist); });
                    aC.data.datasets[1] = { label: e.target.value, data: mkA(ff), borderColor: '#FF3B30', borderDash: [5,5], pointBackgroundColor: '#FF3B30', pointRadius: 4 }; aC.update(); 
                };
            } else if (mode === 'matrix') { c.innerHTML = await renderMatrix(dist, stroke, p3); }
            else if (mode === 'history') {
                // ✅ 修正 6：歷年紀錄必須增加 項目(v[3]) 欄位並過濾，防止 1500 出現在 50
                const res = await remoteQuery(`SELECT 年份, 成績, 賽事名稱, 項目 FROM swimming_scores WHERE 姓名='${p1}' AND 項目 LIKE '%${dist}公尺%${stroke}%' AND ${LC_FILTER} ORDER BY 年份 DESC`);
                const fR = res[0].values.filter(v => {
                    const m = v[3].match(/(\d+)公尺/);
                    return m && String(m[1]) === String(dist);
                });
                const minS = fR.length > 0 ? Math.min(...fR.map(v => timeToSec(v[1]))) : 0;
                let h = `<div class="data-panel"><div style="color:#FFD933; font-weight:bold; margin-bottom:10px;">歷年紀錄</div>`;
                fR.forEach(v => { const s = timeToSec(v[1]); h += `<div class="list-row ${s===minS?'row-gold':''}"><span class="col-8code-fixed">${v[0]}</span><span class="col-time-fixed">${formatToXcode(s)}</span><span class="col-meet-fixed">${v[2]}</span></div>`; });
                c.innerHTML = h + "</div>";
            }
        }

        async function handleDBUpload(files) { if(!files[0]) return; document.getElementById('progressContainer').classList.remove('hidden'); const buffer = await files[0].arrayBuffer(); worker.postMessage({ type: 'INIT', data: new Uint8Array(buffer) }); const openReq = indexedDB.open("SwimSQL", 1); openReq.onupgradeneeded = e => e.target.result.createObjectStore("files"); openReq.onsuccess = e => e.target.result.transaction("files", "readwrite").objectStore("files").put(files[0], "current_db"); }
        async function startSystem() { const openReq = indexedDB.open("SwimSQL", 1); openReq.onsuccess = e => { if(!e.target.result.objectStoreNames.contains("files")) return; const getReq = e.target.result.transaction("files", "readonly").objectStore("files").get("current_db"); getReq.onsuccess = async () => { if (getReq.result) { const buf = await (getReq.result instanceof Blob ? getReq.result.arrayBuffer() : getReq.result); worker.postMessage({ type: 'INIT', data: new Uint8Array(buf) }); } }; }; }
        startSystem();
        function collapseAll() { document.querySelectorAll('.drill-down.active').forEach(p => p.classList.remove('active')); }
        function resetDB() { if (confirm("重置清除資料庫？")) { indexedDB.deleteDatabase("SwimSQL"); location.reload(); } }
        function toggleHistory() { let h = JSON.parse(localStorage.getItem('swim_h')||"[]"), html = `<div id="histModal" style="position:fixed; top:65px; left:16px; right:16px; max-height:400px; overflow-y:auto; background:#1C1C1E; border:1px solid #333; border-radius:12px; padding:12px; z-index:1000;"><div style="display:flex; justify-content:space-between; margin-bottom:12px; border-bottom:0.5px solid #444; padding-bottom:10px;"><span style="color:#D4AF37; font-weight:bold;">歷史紀錄</span><span onclick="document.getElementById('histModal').remove()" style="color:#8E8E93; cursor:pointer;">關閉</span></div>`; h.forEach(n => html += `<div style="display:flex; justify-content:space-between; padding:12px 5px; border-bottom:0.5px solid #222;"><span onclick="selectHist('${n}')" style="flex:1; cursor:pointer; color:#FFF;">${n}</span><span onclick="deleteHistory('${n}')" style="cursor:pointer;">🗑️</span></div>`); document.body.insertAdjacentHTML('beforeend', html+'</div>'); }
        function selectHist(n) { document.getElementById('searchInput').value = n; if(document.getElementById('histModal')) document.getElementById('histModal').remove(); doSearch(); }
        function deleteHistory(n) { let h = JSON.parse(localStorage.getItem('swim_h')||"[]").filter(x => x!==n); localStorage.setItem('swim_h', JSON.stringify(h)); if(document.getElementById('histModal')) document.getElementById('histModal').remove(); toggleHistory(); }
        function saveHistory(n) { if(!n) return; let h = JSON.parse(localStorage.getItem('swim_h')||"[]"); h = [n, ...h.filter(x => x !== n)].slice(0,30); localStorage.setItem('swim_h', JSON.stringify(h)); }
    </script>
</body>
